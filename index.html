<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우주정거장 파인더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.4/satellite.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(226, 232, 240, 0.8); border-radius: 24px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .station-btn.active, .period-btn.active { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); color: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); }
        .loading-spinner { border: 3px solid rgba(79, 70, 229, 0.1); border-left-color: #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .three-container { width: 100%; height: 350px; background: radial-gradient(circle at center, #ffffff 0%, #e2e8f0 100%); position: relative; cursor: grab; touch-action: none; }
        .three-container:active { cursor: grabbing; }
        .nav-fab { position: fixed; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 12px; z-index: 9990; }
        .fab-btn { width: 50px; height: 50px; border-radius: 25px; background: #4f46e5; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0,0,0,0.15); transition: all 0.3s; cursor: pointer; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30, 41, 59, 0.9); color: white; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 14px; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 9999; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .loc-input { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 14px; color: #1e293b; font-size: 14px; width: 100%; transition: border-color 0.2s; }
        .loc-input:focus { outline: none; border-color: #4f46e5; }
        .saved-loc-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; transition: all 0.2s; padding: 12px; cursor: pointer; }
        .saved-loc-card:hover { border-color: #4f46e5; background: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 pb-24">

    <!-- 시작 안내 오버레이 -->
    <div id="startOverlay" class="fixed inset-0 z-[10000] flex items-center justify-center bg-white bg-opacity-90 backdrop-blur-md transition-opacity duration-500">
        <div class="glass-card p-8 text-center max-w-sm mx-4">
            <div class="w-20 h-20 mx-auto bg-indigo-500/10 rounded-full flex items-center justify-center mb-6 border border-indigo-500/20">
                <i class="fas fa-compass text-4xl text-indigo-600 animate-pulse"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-3">정밀 관측 준비</h2>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed">우주정거장의 실시간 위치와<br/>폰 방향이 연동된 3D 궤도를 확인해 보세요.</p>
            <button onclick="startApp()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all mb-3">시작하기</button>
            <button onclick="closeOverlayOnly()" class="text-xs text-slate-400 underline p-2">나침반 없이 시작</button>
        </div>
    </div>

    <!-- 관측 상세 지도 모달 -->
    <div id="passMapModal" class="fixed inset-0 z-[20000] hidden items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 transition-opacity duration-300 opacity-0">
        <div class="bg-white w-full max-w-5xl h-[85vh] rounded-3xl flex flex-col overflow-hidden shadow-2xl relative transform transition-transform scale-95" id="passMapModalContent">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 bg-slate-50">
                <h3 id="passMapTitle" class="font-black text-lg text-slate-800">
                    <i class="fas fa-satellite text-indigo-500 mr-2"></i> 관측 궤도 상세 지도
                </h3>
                <button onclick="closePassMap()" class="text-slate-400 hover:text-red-500 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="passDetailMap" class="flex-1 w-full bg-slate-200"></div>
        </div>
    </div>

    <div class="nav-fab">
        <button onclick="scrollToCard('prev')" class="fab-btn"><i class="fas fa-chevron-up"></i></button>
        <button onclick="scrollToCard('next')" class="fab-btn"><i class="fas fa-chevron-down"></i></button>
    </div>

    <div id="toast"></div>

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 mb-2 tracking-tighter">우주정거장 파인더</h1>
            <p id="headerLocDesc" class="text-slate-500 text-sm font-medium">위치 탐색 중...</p>
            <div class="mt-6 mb-2">
                <button onclick="toggleLocationSettings()" id="btnToggleSettings" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-black py-3.5 px-8 rounded-full shadow-lg transition-all inline-flex items-center gap-2">
                    <i class="fas fa-cog"></i> 관측 위치 변경
                </button>
            </div>
        </header>

        <div id="locationSettingsPanel" class="glass-card p-6 mb-6 hidden">
            <!-- 지도에서 위치 선택 영역 -->
            <div class="mb-4">
                <span class="text-[10px] text-slate-400 font-black mb-2 block"><i class="fas fa-map-marked-alt mr-1"></i>지도에서 클릭하여 위치 선택</span>
                <div id="locSelectionMap" class="w-full h-48 md:h-64 rounded-xl border border-slate-200 z-10 relative" style="background: #e5e7eb;"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-3 mb-4">
                <div class="md:col-span-3"><input type="text" id="locName" class="loc-input h-full" placeholder="위치 이름 (예: 우리집)"></div>
                <div class="md:col-span-3"><input type="number" id="locLat" class="loc-input h-full" placeholder="위도" step="0.0001"></div>
                <div class="md:col-span-3"><input type="number" id="locLng" class="loc-input h-full" placeholder="경도" step="0.0001"></div>
                <div class="md:col-span-3">
                    <button onclick="applyInputLocation()" class="w-full h-full bg-indigo-600 text-white text-sm font-bold py-3 px-4 rounded-xl shadow-md transition-all hover:bg-indigo-500 active:scale-95">위치 반영</button>
                </div>
            </div>
            
            <div class="flex gap-2 mb-4 border-b border-slate-100 pb-4">
                 <button onclick="fetchCurrentLocation()" class="flex-1 bg-blue-500/10 text-blue-600 text-xs font-black py-3 rounded-xl border border-blue-500/20 hover:bg-blue-500/20 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-location-arrow"></i> 현위치 찾기
                 </button>
                 <button onclick="saveLocation()" id="btnSaveLoc" class="flex-1 bg-green-500/10 text-green-600 text-xs font-black py-3 rounded-xl border border-green-500/20 hover:bg-green-500/20 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> <span id="txtSaveLoc">저장</span>
                 </button>
                 <button onclick="setNewLocation()" class="flex-1 bg-slate-500/10 text-slate-600 text-xs font-black py-3 rounded-xl border border-slate-500/20 hover:bg-slate-500/20 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-eraser"></i> 비우기
                 </button>
            </div>
            
            <div id="savedLocationsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </div>

        <div class="glass-card p-6 mb-6">
            <div id="realtimeMap" class="w-full h-64 md:h-80 rounded-xl border border-slate-200" style="background: #e5e7eb;"></div>
            <div class="flex flex-col md:flex-row justify-between mt-4 text-xs font-bold gap-3">
                <span id="issCurrentLoc" class="bg-blue-50 text-blue-600 p-3 rounded-xl border border-blue-100 flex-1 text-center">ISS 데이터 대기 중...</span>
                <span id="cssCurrentLoc" class="bg-red-50 text-red-600 p-3 rounded-xl border border-red-100 flex-1 text-center">CSS 데이터 대기 중...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-10">
            <div class="glass-card p-6 lg:col-span-2">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <span class="text-[10px] text-slate-400 font-black mb-3 block">Satellite</span>
                        <div class="flex gap-2">
                            <button onclick="changeStation('ALL')" id="btnALL" class="station-btn active flex-1 py-3 rounded-2xl text-sm font-bold">모두</button>
                            <button onclick="changeStation('ISS')" id="btnISS" class="station-btn flex-1 py-3 rounded-2xl text-sm font-bold bg-slate-100 text-slate-500">ISS</button>
                            <button onclick="changeStation('CSS')" id="btnCSS" class="station-btn flex-1 py-3 rounded-2xl text-sm font-bold bg-slate-100 text-slate-500">CSS</button>
                        </div>
                    </div>
                    <div>
                        <span class="text-[10px] text-slate-400 font-black mb-3 block">Period</span>
                        <div class="flex gap-2">
                            <button onclick="changePeriod(7)" id="p1" class="period-btn active flex-1 py-3 rounded-2xl text-xs font-bold">1주</button>
                            <button onclick="changePeriod(15)" id="p2" class="period-btn flex-1 py-3 rounded-2xl text-xs font-bold bg-slate-100 text-slate-500">15일</button>
                            <button onclick="changePeriod(30)" id="p3" class="period-btn flex-1 py-3 rounded-2xl text-xs font-bold bg-slate-100 text-slate-500">1개월</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="glass-card p-6 flex flex-col justify-center items-center text-center">
                <div id="lastUpdate" class="text-xl font-mono text-slate-800 font-bold">--:--:--</div>
                <div class="text-[10px] text-slate-400 mt-1 uppercase">Last TLE Sync</div>
                <button onclick="updateData()" id="updateBtn" class="mt-4 bg-indigo-600 text-white py-3 px-6 rounded-2xl w-full font-bold transition-all hover:bg-indigo-500 active:scale-95 flex items-center justify-center">
                    <i class="fas fa-satellite-dish mr-2" id="refreshIcon"></i> 업데이트
                </button>
            </div>
        </div>

        <div id="loadingArea" class="hidden flex flex-col items-center justify-center py-24 glass-card mb-10">
            <div class="loading-spinner mb-6"></div>
            <p class="text-indigo-600 text-sm font-bold animate-pulse">기상 데이터 및 궤도를 분석 중입니다...</p>
        </div>

        <div id="contentArea" class="space-y-8"></div>
    </div>

    <script>
        const DEFAULT_NAME = "마산 삼계초등학교";
        const DEFAULT_LAT = 35.2321;
        const DEFAULT_LNG = 128.5005;
        
        let currentStation = 'ALL';
        let currentPeriod = 7;
        let allData = { ISS: [], CSS: [] };
        let weatherData = []; 
        let activeScenes = [];
        let savedLocations = [];
        let editingLocId = null;
        let currentRenderedPasses = []; 

        let realtimeMap, issMarker, cssMarker, observerMarker;
        let issOrbitLayer, cssOrbitLayer, issFootprint, cssFootprint;
        let locSelectionMap = null, locSelectionMarker = null; 
        
        let passDetailMap = null, passMapLayers = L.layerGroup(); 
        
        let globalTles = { ISS: null, CSS: null };
        let trackingInterval = null; 
        let globalRenderer, isAnimating = false;

        window.onload = () => {
            loadLocations();
            initMap();
            startGlobalAnimation();
        };

        async function startApp() {
            const overlay = document.getElementById('startOverlay');
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try { await DeviceOrientationEvent.requestPermission(); } catch (err) {}
            }
            if (overlay) overlay.style.opacity = '0';
            setTimeout(() => { 
                if (overlay) overlay.style.display = 'none'; 
                loadInitialLocation(); 
            }, 400);
        }

        function closeOverlayOnly() {
            const overlay = document.getElementById('startOverlay');
            if (overlay) overlay.style.display = 'none';
            loadInitialLocation();
        }

        function loadInitialLocation() {
            const laInput = document.getElementById('locLat');
            const loInput = document.getElementById('locLng');
            const naInput = document.getElementById('locName');
            
            if (savedLocations.length > 0) {
                const loc = savedLocations[0];
                if (laInput) laInput.value = loc.lat;
                if (loInput) loInput.value = loc.lng;
                if (naInput) naInput.value = loc.name;
                showToast(`저장된 '${loc.name}' 위치를 불러왔습니다.`);
            } else {
                if (laInput) laInput.value = DEFAULT_LAT;
                if (loInput) loInput.value = DEFAULT_LNG;
                if (naInput) naInput.value = DEFAULT_NAME;
            }
            updateData();
        }

        function getGlobalRenderer() {
            if (!globalRenderer) {
                globalRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                globalRenderer.setPixelRatio(window.devicePixelRatio);
            }
            return globalRenderer;
        }

        function initMap() {
            realtimeMap = L.map('realtimeMap', { attributionControl: false, maxBounds: [[-90, -180], [90, 180]], maxBoundsViscosity: 0.8, zoomSnap: 1 }); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 18, minZoom: 1, noWrap: true }).addTo(realtimeMap);
            realtimeMap.setView([DEFAULT_LAT, DEFAULT_LNG], window.innerWidth < 768 ? 1 : 2);

            issOrbitLayer = L.layerGroup().addTo(realtimeMap);
            cssOrbitLayer = L.layerGroup().addTo(realtimeMap);

            issFootprint = L.circle([0, 0], { radius: 0, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.1, weight: 1, dashArray: '4', interactive: false }).addTo(realtimeMap);
            cssFootprint = L.circle([0, 0], { radius: 0, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.1, weight: 1, dashArray: '4', interactive: false }).addTo(realtimeMap);

            const issIcon = L.divIcon({ className: 'custom-div-icon', html: '<div class="flex items-center justify-center w-6 h-6 bg-blue-500 rounded-full border-2 border-white shadow-md text-white text-[10px]"><i class="fas fa-globe"></i></div>', iconSize: [24, 24] });
            const cssIcon = L.divIcon({ className: 'custom-div-icon', html: '<div class="flex items-center justify-center w-6 h-6 bg-red-500 rounded-full border-2 border-white shadow-md text-white text-[10px]"><i class="fas fa-rocket"></i></div>', iconSize: [24, 24] });
            const obsIcon = L.divIcon({ className: 'custom-div-icon', html: '<div class="w-4 h-4 bg-green-500 rounded-full border-2 border-white shadow-sm"></div>', iconSize: [16, 16] });

            issMarker = L.marker([0, 0], {icon: issIcon}).addTo(realtimeMap);
            cssMarker = L.marker([0, 0], {icon: cssIcon}).addTo(realtimeMap);
            observerMarker = L.marker([DEFAULT_LAT, DEFAULT_LNG], {icon: obsIcon}).addTo(realtimeMap);
        }

        function getSatLatLngAtTime(tle, date) {
            if (!tle) return null;
            try {
                const satrec = satellite.twoline2satrec(tle[0], tle[1]);
                const pv = satellite.propagate(satrec, date);
                if (!pv.position) return null;
                const gmst = satellite.gstime(date), gd = satellite.eciToGeodetic(pv.position, gmst);
                return { lat: satellite.degreesLat(gd.latitude), lng: satellite.degreesLong(gd.longitude), alt: gd.height };
            } catch (e) { return null; }
        }

        function getSatLatLng(tle) {
            return getSatLatLngAtTime(tle, new Date());
        }

        function getFootprintRadius(altKm) {
            const R = 6371;
            const angle = Math.acos(R / (R + altKm));
            return R * angle * 1000;
        }

        function drawOrbitLines(layerGroup, tle, color) {
            if (!tle) return;
            layerGroup.clearLayers();
            try {
                const satrec = satellite.twoline2satrec(tle[0], tle[1]);
                const now = new Date();
                let currentPath = [];
                let lastLng = null;

                for (let i = -10; i <= 90; i++) {
                    const date = new Date(now.getTime() + i * 60000);
                    const pv = satellite.propagate(satrec, date);
                    if (!pv.position) continue;
                    const gmst = satellite.gstime(date), gd = satellite.eciToGeodetic(pv.position, gmst);
                    const lat = satellite.degreesLat(gd.latitude), lng = satellite.degreesLong(gd.longitude);

                    if (lastLng !== null && Math.abs(lng - lastLng) > 150) {
                        L.polyline(currentPath, { color, weight: 2, dashArray: '5, 8', opacity: 0.6 }).addTo(layerGroup);
                        currentPath = [];
                    }
                    currentPath.push([lat, lng]);
                    lastLng = lng;
                }
                if (currentPath.length > 0) L.polyline(currentPath, { color, weight: 2, dashArray: '5, 8', opacity: 0.6 }).addTo(layerGroup);
            } catch (e) { console.error("Orbit line error:", e); }
        }

        function updateRealTimeTracking() {
            if (globalTles.ISS) {
                const pos = getSatLatLng(globalTles.ISS);
                if (pos) {
                    issMarker.setLatLng([pos.lat, pos.lng]);
                    issFootprint.setLatLng([pos.lat, pos.lng]).setRadius(getFootprintRadius(pos.alt));
                    drawOrbitLines(issOrbitLayer, globalTles.ISS, '#3b82f6');
                    const locText = document.getElementById('issCurrentLoc');
                    if (locText) locText.innerText = `ISS: ${pos.lat.toFixed(2)}°, ${pos.lng.toFixed(2)}° (${pos.alt.toFixed(0)}km)`;
                }
            }
            if (globalTles.CSS) {
                const pos = getSatLatLng(globalTles.CSS);
                if (pos) {
                    cssMarker.setLatLng([pos.lat, pos.lng]);
                    cssFootprint.setLatLng([pos.lat, pos.lng]).setRadius(getFootprintRadius(pos.alt));
                    drawOrbitLines(cssOrbitLayer, globalTles.CSS, '#ef4444');
                    const locText = document.getElementById('cssCurrentLoc');
                    if (locText) locText.innerText = `CSS: ${pos.lat.toFixed(2)}°, ${pos.lng.toFixed(2)}° (${pos.alt.toFixed(0)}km)`;
                }
            }
        }

        async function fetchWeatherData(lat, lng) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=temperature_2m,relative_humidity_2m,precipitation_probability,cloudcover,wind_speed_10m,visibility&timezone=auto`);
                if (!res.ok) throw new Error("Weather API Error");
                const data = await res.json();
                if (data && data.hourly) {
                    return data.hourly.time.map((time, idx) => ({
                        time: new Date(time).getTime(),
                        temp: data.hourly.temperature_2m[idx],
                        humidity: data.hourly.relative_humidity_2m[idx],
                        precip: data.hourly.precipitation_probability[idx],
                        clouds: data.hourly.cloudcover[idx],
                        wind: data.hourly.wind_speed_10m[idx],
                        visibility: data.hourly.visibility[idx]
                    }));
                }
            } catch (e) { 
                console.error("기상 정보를 가져오는 중 오류 발생:", e); 
            }
            return [];
        }

        function getClosestWeather(timestamp) {
            if (!weatherData || weatherData.length === 0) return null;
            return weatherData.reduce((prev, curr) => 
                Math.abs(curr.time - timestamp) < Math.abs(prev.time - timestamp) ? curr : prev
            );
        }

        function getWeatherUI(timestamp) {
            const w = getClosestWeather(timestamp);
            if (!w) return `<span class="text-gray-400 text-[10px]">날씨 정보 수집 실패</span>`;
            
            let icon = 'fa-sun'; let color = 'text-yellow-500'; let label = '맑음';
            let score = 0;
            if (w.clouds > 80) { icon = 'fa-cloud'; color = 'text-gray-500'; label = '흐림'; score = 10; }
            else if (w.clouds > 50) { icon = 'fa-cloud-sun'; color = 'text-gray-400'; label = '구름 많음'; score = 30; }
            else if (w.clouds > 20) { icon = 'fa-cloud-sun'; color = 'text-blue-300'; label = '구름 조금'; score = 70; }
            else { icon = 'fa-sun'; color = 'text-yellow-500'; label = '맑음'; score = 100; }
            if (w.precip > 30) score -= 40;
            if (w.visibility < 10000) score -= 30;

            let badge = "";
            if (score >= 80) badge = `<span class="px-2 py-0.5 rounded bg-green-500 text-white text-[9px] font-black uppercase">최적</span>`;
            else if (score >= 50) badge = `<span class="px-2 py-0.5 rounded bg-blue-400 text-white text-[9px] font-black uppercase">양호</span>`;
            else if (score >= 20) badge = `<span class="px-2 py-0.5 rounded bg-orange-400 text-white text-[9px] font-black uppercase">주의</span>`;
            else badge = `<span class="px-2 py-0.5 rounded bg-red-400 text-white text-[9px] font-black uppercase">불가</span>`;

            return `
                <div class="flex flex-col items-end gap-1">
                    <div class="flex items-center gap-2">
                        <i class="fas ${icon} ${color} text-xl"></i>
                        <div class="text-right">
                            <div class="text-xs font-black text-slate-800">${label} (${w.clouds}%)</div>
                            <div class="text-[10px] text-slate-500 font-bold">${w.temp}°C | 습도 ${w.humidity}%</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${badge}
                        <div class="text-[9px] text-slate-400 font-medium">시정 ${(w.visibility/1000).toFixed(1)}km</div>
                    </div>
                </div>`;
        }

        function fetchCurrentLocation() {
            if (!navigator.geolocation) {
                showToast("GPS를 지원하지 않는 브라우저입니다.", "red");
                return;
            }
            showToast("현재 위치를 요청 중입니다...", "blue");
            navigator.geolocation.getCurrentPosition((p) => {
                const la = document.getElementById('locLat'), lo = document.getElementById('locLng'), na = document.getElementById('locName');
                if (la) la.value = p.coords.latitude.toFixed(4);
                if (lo) lo.value = p.coords.longitude.toFixed(4);
                if (na && (!na.value || na.value.includes("새 위치"))) na.value = "현재 내 위치";
                showToast("위치 정보를 가져왔습니다.");
                
                if (locSelectionMap && locSelectionMarker) {
                    const latlng = [p.coords.latitude, p.coords.longitude];
                    locSelectionMap.setView(latlng, 10);
                    locSelectionMarker.setLatLng(latlng);
                }
            }, (err) => {
                showToast("위치 접근 권한이 거부되었습니다.", "red");
            }, { timeout: 10000 });
        }

        function toggleLocationSettings() {
            const p = document.getElementById('locationSettingsPanel');
            if (p) {
                p.classList.toggle('hidden');
                if (!p.classList.contains('hidden')) {
                    setTimeout(() => {
                        initSelectionMap();
                        const lat = parseFloat(document.getElementById('locLat').value) || DEFAULT_LAT;
                        const lng = parseFloat(document.getElementById('locLng').value) || DEFAULT_LNG;
                        locSelectionMap.setView([lat, lng], 7);
                        if (locSelectionMarker) {
                            locSelectionMarker.setLatLng([lat, lng]);
                        } else {
                            const obsIcon = L.divIcon({ className: 'custom-div-icon', html: '<div class="w-4 h-4 bg-indigo-500 rounded-full border-2 border-white shadow-sm"></div>', iconSize: [16, 16] });
                            locSelectionMarker = L.marker([lat, lng], {icon: obsIcon}).addTo(locSelectionMap);
                        }
                    }, 100);
                }
            }
        }

        function initSelectionMap() {
            if (locSelectionMap) {
                locSelectionMap.invalidateSize();
                return;
            }
            locSelectionMap = L.map('locSelectionMap', { attributionControl: false, zoomControl: true }).setView([DEFAULT_LAT, DEFAULT_LNG], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 18, minZoom: 5 }).addTo(locSelectionMap);

            locSelectionMap.on('click', function(e) {
                const lat = e.latlng.lat.toFixed(4);
                const lng = e.latlng.lng.toFixed(4);
                
                document.getElementById('locLat').value = lat;
                document.getElementById('locLng').value = lng;
                
                const naInput = document.getElementById('locName');
                if (!naInput.value || naInput.value.includes("새 위치") || naInput.value.includes("현재 내 위치") || naInput.value.includes("지도에서 선택한 위치") || naInput.value === DEFAULT_NAME) {
                    naInput.value = getNextAutoName();
                }

                if (locSelectionMarker) {
                    locSelectionMarker.setLatLng(e.latlng);
                } else {
                    const obsIcon = L.divIcon({ className: 'custom-div-icon', html: '<div class="w-4 h-4 bg-indigo-500 rounded-full border-2 border-white shadow-sm"></div>', iconSize: [16, 16] });
                    locSelectionMarker = L.marker(e.latlng, {icon: obsIcon}).addTo(locSelectionMap);
                }
            });
        }

        function saveLocation() {
            const na = document.getElementById('locName'), la = document.getElementById('locLat'), lo = document.getElementById('locLng');
            if (!na || !la || !lo) return;
            const name = na.value.trim(), lat = parseFloat(la.value), lng = parseFloat(lo.value);
            if (!name || isNaN(lat) || isNaN(lng)) { showToast("이름과 좌표를 올바르게 입력하세요.", "red"); return; }
            
            if (editingLocId) {
                const idx = savedLocations.findIndex(l => l.id === editingLocId);
                if (idx !== -1) savedLocations[idx] = { id: editingLocId, name, lat, lng };
                editingLocId = null;
                document.getElementById('txtSaveLoc').innerText = "저장";
                showToast("위치가 수정되었습니다.");
            } else {
                if (savedLocations.length >= 3) {
                    showToast("최대 3개까지만 저장 가능합니다. 기존 위치를 삭제해주세요.", "red");
                    return;
                }
                savedLocations.push({ id: Date.now().toString(), name, lat, lng });
                showToast("위치를 저장했습니다.");
            }
            
            localStorage.setItem('spaceTrackerLocations', JSON.stringify(savedLocations)); 
            renderSavedLocations();

        async function fetchTLEs() {
            let iss = null, css = null;
            try {
                const r = await fetch("https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle");
                if (!r.ok) throw new Error("TLE API Error");
                const t = await r.text();
                const ls = t.split('\n').map(x => x.trim()).filter(x => x.length > 0);
                
                for(let k = 0; k < ls.length; k++) {
                    if (ls[k].startsWith("1 25544U")) iss = [ls[k], ls[k+1]];
                    if (ls[k].startsWith("1 48274U")) css = [ls[k], ls[k+1]];
                }
            } catch (e) { console.error("TLE Fetch Error:", e); }

            if (!css) {
                try {
                    const r2 = await fetch("https://celestrak.org/NORAD/elements/gp.php?CATNR=48274&FORMAT=tle");
                    if (r2.ok) {
                        const t2 = await r2.text();
                        const ls2 = t2.split('\n').map(x => x.trim()).filter(x => x.length > 0);
                        if (ls2.length >= 2 && ls2[0].startsWith("1 48274U")) css = [ls2[0], ls2[1]];
                        else if (ls2.length >= 3 && ls2[1].startsWith("1 48274U")) css = [ls2[1], ls2[2]];
                    }
                } catch (e) { console.error("CSS Fallback Fetch Error:", e); }
            }

            if (!iss) iss = ["1 25544U 98067A   24131.54714120  .00016717  00000-0  30177-3 0  9990", "2 25544  51.6416  20.8954 0004817  70.7416  30.4093 15.49845345454315"];
            if (!css) css = ["1 48274U 21035A   24131.53692882  .00010000  00000-0  10000-3 0  9990", "2 48274  41.4723 151.7412 0001432  85.7412 274.3521 15.58912345172635"];
            return { iss, css };
        }

        function calculatePasses(tle, lat, lng, days, type) {
            const sr = satellite.twoline2satrec(tle[0], tle[1]), ps = [], now = new Date(), end = now.getTime() + days * 86400000;
            let t = now.getTime();
            while (t <= end) {
                const d = new Date(t), pv = satellite.propagate(sr, d);
                if (!pv.position) { t += 60000; continue; }
                const gmst = satellite.gstime(d), ecf = satellite.eciToEcf(pv.position, gmst), obs = { longitude: lng*Math.PI/180, latitude: lat*Math.PI/180, height: 0.1 };
                const la = satellite.ecfToLookAngles(obs, ecf), el = la.elevation * 180 / Math.PI;
                if (el >= 0) {
                    let s = null, m = null, e = null, maxEl = -90, vis = 0;
                    while (t <= end) {
                        const fd = new Date(t), fpv = satellite.propagate(sr, fd); if (!fpv.position) break;
                        const fgs = satellite.gstime(fd), fe = satellite.eciToEcf(fpv.position, fgs), fl = satellite.ecfToLookAngles(obs, fe);
                        const fel = fl.elevation * 180 / Math.PI, faz = fl.azimuth * 180 / Math.PI;
                        if (fel < 0) break;
                        if (fel >= 10) {
                            if (!s) s = { time: fd, az: faz };
                            if (fel > maxEl) { maxEl = fel; m = { time: fd, az: faz, el: fel }; }
                            e = { time: fd, az: faz };
                            const sp = SunCalc.getPosition(fd, lat, lng), pgd = satellite.eciToGeodetic(fpv.position, fgs), sa = SunCalc.getPosition(fd, pgd.latitude*180/Math.PI, pgd.longitude*180/Math.PI);
                            if (sp.altitude < -0.05 && sa.altitude > -Math.acos(6371/(6371+pgd.height))) vis++;
                        }
                        t += 10000;
                    }
                    if (s && e && m && vis > 0 && maxEl >= 10) ps.push(formatPass({ start: s, max: m, end: e }, type, tle, lat, lng));
                    t += 2400000;
                } else t += 60000;
            }
            return ps;
        }

        function formatPass(p, type, tle, obsLat, obsLng) {
            const d = p.max.time, week = ['일', '월', '화', '수', '목', '금', '토'];
            const ft = (t) => {
                const h = t.getHours().toString().padStart(2, '0'), m = t.getMinutes().toString().padStart(2, '0'), s = t.getSeconds().toString().padStart(2, '0');
                return { short: `${h} : ${m}`, long: `${h} : ${m} : ${s}` };
            };
            const ds = Math.floor((p.end.time - p.start.time) / 1000);
            const getAzStr = (az) => {
                const dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
                return dirs[Math.floor((az / 22.5) + 0.5) % 16];
            };
            
            return { 
                type, 
                date: `${d.getMonth()+1}월 ${d.getDate()}일 (${week[d.getDay()]})`, 
                startTime: ft(p.start.time).long, 
                endTime: ft(p.end.time).long, 
                peakTime: ft(p.max.time).long, 
                alt: p.max.el.toFixed(1), 
                dir: `${getAzStr(p.start.az)} -> ${getAzStr(p.end.az)}`, 
                duration: `${Math.floor(ds/60)}분 ${ds%60}초`, 
                timestamp: p.start.time.getTime(), 
                mag: (type === 'ISS' ? -3.5 : -1.0 + (90 - p.max.el)*0.02).toFixed(1),
                rawStartMs: p.start.time.getTime(),
                rawEndMs: p.end.time.getTime(),
                rawPeakMs: p.max.time.getTime(),
                tle: tle,
                obsLat: obsLat,
                obsLng: obsLng
            };
        }

        async function updateData() {
            const b = document.getElementById('updateBtn'), i = document.getElementById('refreshIcon'), l = document.getElementById('loadingArea'), c = document.getElementById('contentArea');
            const laInput = document.getElementById('locLat'), loInput = document.getElementById('locLng');
            if (!laInput || !loInput) return;
            
            const la = laInput.value ? parseFloat(laInput.value) : DEFAULT_LAT;
            const ln = loInput.value ? parseFloat(loInput.value) : DEFAULT_LNG;
            
            if (document.getElementById('headerLocDesc')) {
                const n = document.getElementById('locName').value || DEFAULT_NAME;
                document.getElementById('headerLocDesc').innerText = `${n} (${la}, ${ln})`;
            }
            if (observerMarker) observerMarker.setLatLng([la, ln]);
            
            if (b) b.disabled = true; if (i) i.classList.add('fa-spin'); 
            if (l) l.classList.remove('hidden'); if (c) c.innerHTML = ""; 
            activeScenes = [];

            try {
                const [tles, weather] = await Promise.allSettled([fetchTLEs(), fetchWeatherData(la, ln)]);
                const tlesData = tles.status === 'fulfilled' ? tles.value : await fetchTLEs();
                weatherData = weather.status === 'fulfilled' ? weather.value : [];

                globalTles.ISS = tlesData.iss; globalTles.CSS = tlesData.css; 

                if (trackingInterval) clearInterval(trackingInterval);
                trackingInterval = setInterval(updateRealTimeTracking, 3000);
                updateRealTimeTracking();

                allData.ISS = calculatePasses(tlesData.iss, la, ln, currentPeriod, 'ISS');
                allData.CSS = calculatePasses(tlesData.css, la, ln, currentPeriod, 'CSS');
                renderPasses();
                if (document.getElementById('lastUpdate')) document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
            } catch (e) { 
                console.error("Update Error:", e);
                showToast("데이터 갱신 중 오류가 발생했습니다.", "red");
            } finally { 
                if (b) b.disabled = false; if (i) i.classList.remove('fa-spin'); 
                if (l) l.classList.add('hidden'); 
            }
        }

        // --- 상세 궤도 지도 시각화 (2D) ---
        function getBearingForSwath(lat1, lng1, lat2, lng2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lng2 - lng1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function getDestPointForSwath(lat, lng, bearing, distKm) {
            const R = 6371, d = distKm / R, lat1 = lat * Math.PI / 180, lon1 = lng * Math.PI / 180, brng = bearing * Math.PI / 180;
            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(d) + Math.cos(lat1) * Math.sin(d) * Math.cos(brng));
            let lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(d) * Math.cos(lat1), Math.cos(d) - Math.sin(lat1) * Math.sin(lat2));
            return [lat2 * 180 / Math.PI, ((lon2 * 180 / Math.PI + 540) % 360 - 180)];
        }

        function drawPassDetails(p) {
            passMapLayers.clearLayers();
            const color = p.type === 'ISS' ? '#3b82f6' : '#ef4444';
            
            const obsIcon = L.divIcon({ className: 'custom-div-icon', html: '<div class="w-4 h-4 bg-green-500 rounded-full border-2 border-white shadow-md"></div>', iconSize: [16, 16] });
            L.marker([p.obsLat, p.obsLng], {icon: obsIcon}).addTo(passMapLayers);
            
            const peakPos = getSatLatLngAtTime(p.tle, new Date(p.rawPeakMs));
            if (peakPos) {
                const obsRadius = getFootprintRadius(peakPos.alt);
                L.circle([p.obsLat, p.obsLng], { radius: obsRadius, color: '#22c55e', weight: 2, dashArray: '5,10', fill: false }).addTo(passMapLayers);
                
                const satIcon = L.divIcon({ className: 'custom-div-icon', html: `<div class="flex items-center justify-center w-8 h-8 ${p.type === 'ISS' ? 'bg-blue-500' : 'bg-red-500'} rounded-full border-2 border-white shadow-lg text-white text-xs"><i class="fas ${p.type === 'ISS' ? 'fa-globe' : 'fa-rocket'}"></i></div>`, iconSize: [32, 32] });
                L.marker([peakPos.lat, peakPos.lng], {icon: satIcon}).addTo(passMapLayers).bindTooltip("정점 (최대 고도)", {permanent: true, direction: "top", className: 'font-bold text-xs bg-white/90 backdrop-blur-sm border-none shadow-sm'}).openTooltip();
            }

            let segments = [];
            let curLefts = [], curRights = [], curCenters = [];
            let prevLng = null;
            
            let st = p.rawStartMs - 4 * 60000; 
            let et = p.rawEndMs + 4 * 60000; 
            const satrec = satellite.twoline2satrec(p.tle[0], p.tle[1]);
            
            for (let t = st; t <= et; t += 10000) {
                const date = new Date(t);
                const pv = satellite.propagate(satrec, date);
                if (!pv.position) continue;
                const gmst = satellite.gstime(date), gd = satellite.eciToGeodetic(pv.position, gmst);
                const lat = satellite.degreesLat(gd.latitude), lng = satellite.degreesLong(gd.longitude);
                
                if (prevLng !== null && Math.abs(lng - prevLng) > 90) {
                    segments.push({ lefts: curLefts, rights: curRights, centers: curCenters });
                    curLefts = []; curRights = []; curCenters = [];
                }
                
                curCenters.push([lat, lng]);
                
                const nd = new Date(t + 10000);
                const npv = satellite.propagate(satrec, nd);
                let brng = 0;
                if (npv.position) {
                    const ngd = satellite.eciToGeodetic(npv.position, satellite.gstime(nd));
                    brng = getBearingForSwath(lat, lng, satellite.degreesLat(ngd.latitude), satellite.degreesLong(ngd.longitude));
                }
                
                // 궤도 띠 반경
                const distKm = 25; 
                curLefts.push(getDestPointForSwath(lat, lng, brng - 90, distKm));
                curRights.push(getDestPointForSwath(lat, lng, brng + 90, distKm));
                
                prevLng = lng;
            }
            segments.push({ lefts: curLefts, rights: curRights, centers: curCenters });
            
            segments.forEach(seg => {
                if (seg.centers.length > 0) {
                    const ring = [...seg.lefts, ...seg.rights.reverse()];
                    L.polygon(ring, {color: color, weight: 1, fillColor: color, fillOpacity: 0.35, interactive: false}).addTo(passMapLayers);
                    L.polyline(seg.centers, {color: color, weight: 3, opacity: 0.8}).addTo(passMapLayers);
                }
            });

            passDetailMap.setView([p.obsLat, p.obsLng], 6);
        }

        // --- 물리 기반 정확한 3D 궤도 챠트 시각화 ---
        function createTextSprite(t, c, f) {
            const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
            canvas.width = 300; canvas.height = 120; ctx.fillStyle = c; ctx.font = `bold ${f}px Pretendard`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(t, 150, 60);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) })); sprite.scale.set(4.5, 1.8, 1); return sprite;
        }

        function init3DScene(id, p) {
            const container = document.getElementById(id); if (!container) return;
            const canvas2d = document.createElement('canvas'); canvas2d.style.width = canvas2d.style.height = '100%'; canvas2d.style.position = 'absolute'; canvas2d.style.top = canvas2d.style.left = '0'; container.appendChild(canvas2d);
            const ctx = canvas2d.getContext('2d'), r = getGlobalRenderer(), scene = new THREE.Scene(), cam = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
            cam.position.set(0, 10, 15); cam.lookAt(0, 0, 0);
            const wg = new THREE.Group(); scene.add(wg); wg.add(new THREE.GridHelper(16, 8, 0x94a3b8, 0xcbd5e1));
            
            const addL = (txt, pos) => { const l = createTextSprite(txt, 'rgba(71, 85, 105, 0.6)', 40); l.position.copy(pos); wg.add(l); };
            addL('N', new THREE.Vector3(0,0,-9)); addL('S', new THREE.Vector3(0,0,9)); addL('E', new THREE.Vector3(9,0,0)); addL('W', new THREE.Vector3(-9,0,0));

            const maxA = parseFloat(p.alt);

            const satrec = satellite.twoline2satrec(p.tle[0], p.tle[1]);
            const obs = { longitude: p.obsLng*Math.PI/180, latitude: p.obsLat*Math.PI/180, height: 0.1 };
            const R = 8;
            
            const get3DPosAtTime = (timeMs) => {
                const date = new Date(timeMs);
                const pv = satellite.propagate(satrec, date);
                if (!pv.position) return new THREE.Vector3(0,0,0);
                const gmst = satellite.gstime(date);
                const ecf = satellite.eciToEcf(pv.position, gmst);
                const fl = satellite.ecfToLookAngles(obs, ecf);
                return new THREE.Vector3(
                    R * Math.cos(fl.elevation) * Math.sin(fl.azimuth),
                    R * Math.sin(fl.elevation),
                    -R * Math.cos(fl.elevation) * Math.cos(fl.azimuth)
                );
            };

            const curvePoints = [];
            const steps = 40;
            const dt = (p.rawEndMs - p.rawStartMs) / steps;
            
            for(let i = 0; i <= steps; i++) {
                curvePoints.push(get3DPosAtTime(p.rawStartMs + i*dt));
            }
            
            const curve = new THREE.CatmullRomCurve3(curvePoints);
            const highResPoints = curve.getPoints(60);
            const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(highResPoints), new THREE.LineDashedMaterial({ color: 0x4f46e5, dashSize: 0.4, gapSize: 0.2 }));
            line.computeLineDistances(); wg.add(line);

            const obsPos = new THREE.Vector3(0, 0, 0);
            const obsDot = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({ color: 0x22c55e }));
            wg.add(obsDot);
            const obsLabel = createTextSprite("관측자", "#22c55e", 24);
            obsLabel.position.set(0, -0.6, 0);
            wg.add(obsLabel);

            const pPeak = get3DPosAtTime(p.rawPeakMs);
            const p1 = curvePoints[0];
            const p3 = curvePoints[curvePoints.length - 1];

            const peakLineGeom = new THREE.BufferGeometry().setFromPoints([obsPos, pPeak]);
            const peakLineMat = new THREE.LineDashedMaterial({ color: 0xf59e0b, dashSize: 0.3, gapSize: 0.2 });
            const peakLine = new THREE.Line(peakLineGeom, peakLineMat);
            peakLine.computeLineDistances();
            wg.add(peakLine);

            const pGround = new THREE.Vector3(pPeak.x, 0, pPeak.z);
            const groundLineGeom = new THREE.BufferGeometry().setFromPoints([obsPos, pGround, pPeak]);
            const groundLineMat = new THREE.LineDashedMaterial({ color: 0x94a3b8, dashSize: 0.2, gapSize: 0.2 });
            const groundLine = new THREE.Line(groundLineGeom, groundLineMat);
            groundLine.computeLineDistances();
            wg.add(groundLine);

            const maxAngleRad = maxA * Math.PI / 180;
            const arcRadius = 1.8; 
            const arcPoints = [];
            const vecGround = pGround.clone().normalize();
            const vecPeak = pPeak.clone().normalize();
            
            const axis = new THREE.Vector3().crossVectors(vecGround, vecPeak).normalize();
            if (axis.lengthSq() < 0.001) axis.set(1, 0, 0); 

            for (let i = 0; i <= 20; i++) {
                const theta = (i / 20) * maxAngleRad;
                const pt = vecGround.clone().applyAxisAngle(axis, theta).multiplyScalar(arcRadius);
                arcPoints.push(pt);
            }
            
            const arcGeom = new THREE.BufferGeometry().setFromPoints(arcPoints);
            const arcMat = new THREE.LineBasicMaterial({ color: 0xf59e0b });
            const angleArc = new THREE.Line(arcGeom, arcMat);
            wg.add(angleArc);

            const midTheta = maxAngleRad / 2;
            const labelPos = vecGround.clone().applyAxisAngle(axis, midTheta).multiplyScalar(arcRadius + 0.8);
            const altLabel = createTextSprite(`${maxA}°`, '#f59e0b', 50);
            altLabel.position.copy(labelPos);
            wg.add(altLabel);

            const pb = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshBasicMaterial({ color: 0xf59e0b })); pb.position.copy(pPeak); wg.add(pb);
            const peakLabel = createTextSprite(p.peakTime, '#f59e0b', 34); peakLabel.position.set(pPeak.x, pPeak.y + 1, pPeak.z); wg.add(peakLabel);
            
            const p1Dot = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0x3b82f6 })); p1Dot.position.copy(p1); wg.add(p1Dot);
            const startLabel = createTextSprite(p.startTime, '#3b82f6', 28); startLabel.position.set(p1.x, p1.y - 1, p1.z); wg.add(startLabel);
            
            const p3Dot = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0x64748b })); p3Dot.position.copy(p3); wg.add(p3Dot);
            const endLabel = createTextSprite(p.endTime, '#64748b', 28); endLabel.position.set(p3.x, p3.y - 1, p3.z); wg.add(endLabel);

            [15, 45].forEach(idx => {
                const pos = highResPoints[idx]; const nextPos = highResPoints[idx+1];
                const dir = new THREE.Vector3().subVectors(nextPos, pos).normalize();
                const arrow = new THREE.ArrowHelper(dir, pos, 1.2, 0x4f46e5, 0.4, 0.3); wg.add(arrow);
            });

            const s = { container, canvas2d, ctx, scene, camera: cam, worldGroup: wg, targetRotY: 0, prevX: 0, isDragging: false };
            const onDown = (x) => { s.isDragging = true; s.prevX = x; };
            const onMove = (x) => { if (s.isDragging) { s.targetRotY += (x - s.prevX) * 0.015; s.prevX = x; } };
            const onUp = () => { s.isDragging = false; };
            container.addEventListener('mousedown', (e) => onDown(e.clientX));
            window.addEventListener('mousemove', (e) => onMove(e.clientX));
            window.addEventListener('mouseup', onUp);
            container.addEventListener('touchstart', (e) => onDown(e.touches[0].clientX));
            window.addEventListener('touchmove', (e) => onMove(e.touches[0].clientX));
            window.addEventListener('touchend', onUp);
            activeScenes.push(s);
        }

        function startGlobalAnimation() {
            if (isAnimating) return; isAnimating = true;
            const animate = () => {
                requestAnimationFrame(animate); const r = getGlobalRenderer(), dpr = window.devicePixelRatio;
                activeScenes.forEach(s => {
                    const rect = s.container.getBoundingClientRect();
                    if (rect.top < window.innerHeight && rect.bottom > 0) {
                        s.worldGroup.rotation.y += (s.targetRotY - s.worldGroup.rotation.y) * 0.1;
                        const w = s.container.clientWidth, h = s.container.clientHeight;
                        if (w > 0 && h > 0) {
                            if (s.canvas2d.width !== w*dpr) { s.canvas2d.width = w*dpr; s.canvas2d.height = h*dpr; s.camera.aspect = w/h; s.camera.updateProjectionMatrix(); }
                            if (r.getSize(new THREE.Vector2()).x !== w) r.setSize(w, h, false);
                            r.render(s.scene, s.camera); s.ctx.clearRect(0,0,w*dpr,h*dpr); s.ctx.drawImage(r.domElement, 0,0,w*dpr,h*dpr);
                        }
                    }
                });
            }; animate();
        }

        function showToast(m, type = 'blue') { 
            const t = document.getElementById('toast'); 
            if (t) { 
                t.innerText = m; 
                t.style.background = type === 'red' ? 'rgba(239, 68, 68, 0.9)' : 'rgba(30, 41, 59, 0.9)';
                t.classList.add('show'); 
                setTimeout(() => t.classList.remove('show'), 2500); 
            } 
        }
        function scrollToCard(d) {
            const cs = Array.from(document.querySelectorAll('.pass-card')), vt = window.scrollY + 120;
            const tc = d === 'next' ? cs.find(c => c.offsetTop > vt) : cs.slice().reverse().find(c => c.offsetTop < vt - 100);
            if (tc) window.scrollTo({ top: tc.offsetTop - 40, behavior: 'smooth' });
        }
        function changeStation(s) { currentStation = s; document.querySelectorAll('.station-btn').forEach(b => b.classList.toggle('active', b.id === `btn${s}`)); renderPasses(); }
        function changePeriod(p) { currentPeriod = p; document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.id === (p===7?'p1':p===15?'p2':'p3'))); updateData(); }
    </script>
